# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Groq (LLaMA) ──────────────────────────────────────────────────────────────
# NEVER hardcode keys here. Set as environment variables:
#   export GROQ_API_KEY=gsk_...
#   export ASSEMBLYAI_API_KEY=...
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ── AssemblyAI ─────────────────────────────────────────────────────────────────
assemblyai.api.key=${ASSEMBLYAI_API_KEY}
assemblyai.base-url=https://api.assemblyai.com/v2

# ── Multipart (audio file uploads) ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.interview.coach=DEBUG
logging.level.org.springframework.web=INFO
