# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Groq (LLaMA) ──────────────────────────────────────────────────────────────
# Set GROQ_API_KEY as an environment variable, or replace the placeholder below
groq.api.key=${GROQ_API_KEY:your_groq_api_key_here}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# ── AssemblyAI ─────────────────────────────────────────────────────────────────
# Set ASSEMBLYAI_API_KEY as an environment variable, or replace the placeholder below
assemblyai.api.key=${ASSEMBLYAI_API_KEY:your_assemblyai_api_key_here}
assemblyai.base-url=https://api.assemblyai.com/v2

# ── Multipart (audio file uploads) ────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.interview.coach=DEBUG
logging.level.org.springframework.web=INFO
